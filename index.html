<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보도자료 생성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
.wrapper { max-width: 720px; margin: 0 auto; }
.logo-wrap { text-align: center; margin-bottom: 2rem; }
.logo-wrap img { height: 108px; opacity: 0.9; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
.card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
select, input[type="number"] {
  width: 100%; height: 38px; padding: 0 10px;
  border: 1px solid #ddd; border-radius: 8px;
  background: #fff; color: #1a1a1a;
  font-size: 14px; font-family: inherit;
}
select:focus, input:focus { outline: none; border-color: #999; }
.char-guide { font-size: 12px; color: #999; margin-top: 4px; }
textarea {
  width: 100%; padding: 10px 12px;
  border: 1px solid #ddd; border-radius: 8px;
  background: #fff; color: #1a1a1a;
  font-size: 14px; font-family: inherit;
  line-height: 1.6; resize: vertical; min-height: 160px;
}
textarea:focus { outline: none; border-color: #999; }
.upload-area {
  border: 1.5px dashed #ddd; border-radius: 8px;
  padding: 12px 14px; margin-top: 8px;
  display: flex; align-items: center; gap: 12px;
}
.upload-area input { display: none; }
.btn-upload {
  height: 32px; padding: 0 14px;
  background: #fff; color: #1a1a1a;
  border: 1px solid #ddd; border-radius: 6px;
  font-size: 13px; font-family: inherit;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.btn-upload:hover { border-color: #999; }
.upload-info { font-size: 12px; color: #999; line-height: 1.6; }
.upload-info span { color: #555; }
.btn {
  width: 100%; height: 44px;
  background: #1a1a1a; color: #fff;
  border: none; border-radius: 8px;
  font-size: 15px; font-weight: 500; font-family: inherit;
  cursor: pointer; margin-top: 1rem; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.result-box { margin-top: 1.5rem; display: none; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.result-header span { font-size: 13px; color: #666; }
.btn-copy {
  font-size: 13px; color: #555;
  background: none; border: 1px solid #ddd;
  border-radius: 6px; padding: 4px 12px;
  cursor: pointer; font-family: inherit;
}
.btn-copy:hover { color: #1a1a1a; border-color: #999; }
.result-content {
  background: #fff; border: 1px solid #e8e8e4; border-radius: 12px;
  padding: 1.25rem; font-size: 14px; line-height: 1.8;
  color: #1a1a1a; word-break: break-word;

  <h1>보도자료 생성기</h1>
  <p class="subtitle">블루포인트 잡스팀 스타일로 초안을 자동 생성합니다.<br>고민 말고 '일단 생성 → 휴먼 터치'로 다듬어 드립니다.</p>

  <div class="card">
    <div class="options-row">
      <div>
        <label>보도자료 유형</label>
        <select id="type" onchange="updateCharGuide()">
          <option value="투자유치_비공개">투자 유치 (금액 비공개)</option>
          <option value="투자유치_공개">투자 유치 (금액 공개)</option>
          <option value="계약·파트너십">계약·파트너십</option>
          <option value="행사·세미나">행사·세미나</option>
          
          <option value="기획·심층자료">기획·심층자료</option>
        </select>
      </div>
      <div>
        <label>목표 글자 수 (공백 포함)</label>
        <input type="number" id="charCount" value="1200" min="600" max="2000" step="100" />
        <div class="char-guide" id="charGuide">권장: 1,200자</div>
      </div>
    </div>

    <div>
      <label>소스 자료</label>
      <textarea id="sourceText" placeholder="팩트시트, 투심 보고서, 회사 소개, 코멘트 등 텍스트를 직접 붙여넣으세요."></textarea>
    </div>

    <div class="upload-area">
      <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx" onchange="handleFile(event)" />
      <button class="btn-upload" onclick="document.getElementById('fileInput').click()">파일 업로드</button>

        <span>텍스트 직접 입력을 권장합니다.</span><br>

      </div>
    </div>

    <button class="btn" onclick="generate()">초안 생성 →</button>
  </div>

async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const fileStatus = document.getElementById('fileStatus');
  const ext = file.name.split('.').pop().toLowerCase();

  fileStatus.textContent = '파일 읽는 중...';

  try {
    let text = '';

    if (ext === 'txt' || ext === 'md') {
      text = await file.text();

    } else if (ext === 'pdf') {
      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n';
      }

    } else if (ext === 'docx') {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer });
      text = result.value;
    }

    window._uploadedText = text;
    fileStatus.textContent = `✓ ${file.name} 업로드 완료`;
    fileStatus.style.color = '#2d8a4e';
  } catch(e) {
    fileStatus.textContent = '파일 읽기 실패. 텍스트를 직접 붙여넣어 주세요.';
    fileStatus.style.color = '#e53e3e';
  }
}

async function generate() {
  const source = window._uploadedText || document.getElementById('sourceText').value.trim();
  if (!source) { alert('소스 자료를 입력해주세요.'); return; }

  const type = document.getElementById('type').value;
  const targetChars = document.getElementById('charCount').value;
  const resultBox = document.getElementById('resultBox');
  const resultContent = document.getElementById('resultContent');

  resultBox.style.display = 'block';
  resultContent.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>초안 작성 중...</span></div>';

  const systemPrompt = `당신은 블루포인트파트너스 브랜드커뮤니케이션팀의 보도자료 작성 전문가입니다.

【제목】본문에서 가장 임팩트 있는 키워드를 앞으로. 투자유치_비공개: "키워드…회사명, 블루포인트서 시드투자 유치" / 투자유치_공개: "'한줄소개' 회사명, OO억원 규모 시리즈X 투자 유치" / 그 외: "주어·파트너, 핵심행위 명사형"

【유형별 구조】${typeGuide[type]}

【소스 형태별】투심 보고서: 리스크·헷지·TAM/SAM/SOM 삭제, 투심 용어 일반어 전환, 기술 스펙→핵심만 재서술 / 피처 아티클: 투자 팩트 중심 재구성 / SNS: 감성 문구 제거 / 보도자료 초안: 과장·중복 제거

【한글 병기】고유명사·약어·제품명 첫 등장 시 한글(영문) 병기, 이후 한글만
【블루포인트】본문 첫 등장만 "블루포인트파트너스", 이후·제목은 "블루포인트"
【투자금】공개 명시 없으면 비공개. 리드 직후 "정확한 투자금과 기업가치는 비공개다" 삽입
【부족한 자료 처리】소스 자료가 부족해도 기본 틀은 반드시 완성. 정보가 없는 부분은 (○○ 정보 필요) 형식으로 표시. 예: (대표이사 이름 필요), (심사역 코멘트 필요). 빈칸이나 임의 생성 금지.
【날짜】"0일 밝혔다" (빈칸)
【동사 원칙】"밝혔다"는 리드의 명백한 팩트에만. 코멘트 마무리 기본값은 "말했다". 반복 시 "설명했다", "덧붙였다", "강조했다" 변주. 코멘트에 "밝혔다" 금지.
【문체】직접적·사실 중심. 홍보성 수식어 제거. 불렛·표→산문 또는 "△" 나열. 단락마다 핵심 메시지 하나.
【분량】목표 글자 수(공백 포함) ${targetChars}자 내외. 최대 2,000자를 넘지 말 것.

${examples}

헤드라인 포함, 개요표 제외, 배포일 빈칸.`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2500,
        system: systemPrompt,
        messages: [{ role: 'user', content: source }]
      })
    });

    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();
    const raw = data.content?.[0]?.text || '결과를 가져오지 못했습니다.';

    const html = raw
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>')
      .replace(/\(([^)]*필요[^)]*)\)/g, '<span class="missing">($1)</span>');
    resultContent.innerHTML = html;

    const count = raw.length;
    document.getElementById('charCountDisplay').textContent = `공백 포함 ${count.toLocaleString()}자`;
  } catch(e) {
    resultContent.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
  }
}

function copyResult() {
  const text = document.getElementById('resultContent').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '복사됨';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}
